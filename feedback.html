<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yumeji - Feedback</title>
    <link rel="icon" type="image/x-icon" href="Assets/favicon.svg">

    <style>
        html, body {
            padding: 0;
            margin: 0;
        }

        /* Font */
        @font-face {
            font-family: "Noto Serif JP";
            src: url(Assets/Noto_Serif_JP/static/NotoSerifJP-Regular.ttf) format("truetype");
            font-weight: 400;
        }
        @font-face {
            font-family: "Noto Serif JP";
            src: url(Assets/Noto_Serif_JP/static/NotoSerifJP-Bold.ttf) format("truetype");
            font-weight: 700;
        }

        /* Header */
        .header {
            background-color: #FFFFFF;
            border-bottom: 1px solid #EEE;

            display: flex;

            height: 90px;

            padding: 0 90px;

            align-items: center;
            justify-content: space-between;
        }
        .title {
            margin: 0;

            color: #BC002D;
            font-family: "Noto Serif JP", sans-serif;
        }
        .navigation {
            display: flex;

            width: 500px;

            justify-content: right;
            gap: 30px;
        }
        .navigation a {
            font-size: 18px;

            text-decoration: none;
            color: #1c1c1c;
        }
        .navigation a.active {
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* Form Section */
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;

            min-height: calc(100dvh - 91px);

            background-color: #faf9f6;

            padding: 50px 0;
            box-sizing: border-box;
        }

        /* Contact Title */
        .form-title {
            margin: 0 0 32px 0;

            font-size: 34px;
            font-weight: 700;
            color: #BC002D;
            font-family: "Noto Serif JP", sans-serif;
        }

        /* Form Fields Wrapper */
        form {
            display: flex;
            flex-direction: column;
            gap: 14px;

            width: 52%;
            max-width: 780px;
        }

        /* Input & Textarea shared styles */
        .contact-field {
            width: 100%;
            box-sizing: border-box;

            padding: 16px 20px;

            font-family: "Noto Serif JP", sans-serif;
            font-size: 15px;
            color: #1c1c1c;

            background-color: #FFFFFF;
            border: 1px solid #DDD;
            border-radius: 8px;

            outline: none;
        }
        .contact-field::placeholder {
            color: #AAAAAA;
        }
        .contact-field:focus {
            border-color: #BC002D;
        }

        /* Textarea specific */
        textarea.contact-field {
            height: 230px;
            resize: none;
        }

        /* Submit Button */
        .contact-submit {
            width: 100%;

            padding: 18px;

            font-family: "Noto Serif JP", sans-serif;
            font-size: 16px;
            color: #FFFFFF;

            background-color: #BC002D;
            border: none;
            border-radius: 8px;

            cursor: pointer;
        }
        .contact-submit:hover {
            background-color: #9e0025;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header" id="header">
        <h1 class="title">夢路 Yumeji</h1>

        <div class="navigation" id="navigation">
            <a href="index.html">Home</a>
            <a href="activity.html">Activity</a>
            <a href="destinations.html">Destinations</a>
            <a href="culinary.html">Culinary</a>
            <a href="feedback.html" class="active">Feedback</a>
        </div>
    </div>

    <!-- Form -->
    <div class="form" id="form">
        <h2 class="form-title">Contact</h2>

        <form onsubmit="submitForm(event)">
            <input type="text" class="contact-field" placeholder="名前 / Name (Optional)" />
            <textarea class="contact-field" placeholder="メッセージ / Message"></textarea>
            <button type="submit" class="contact-submit">送信 / Submit</button>
        </form>
    </div>
</body>
<script>
    function submitForm(event) {
        event.preventDefault();

    }
</script>
</html>
