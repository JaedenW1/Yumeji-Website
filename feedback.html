<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yumeji - Feedback</title>
    <link rel="icon" type="image/x-icon" href="Assets/favicon.svg">
    <link rel="stylesheet" href="Assets/stylesheet.css">

    <style>
        /* Form Section */
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;

            min-height: calc(100dvh - 91px);

            background-color: #faf9f6;

            padding: 50px 0;
            box-sizing: border-box;
        }

        /* Contact Title */
        .form-title {
            margin: 0 0 32px 0;

            font-size: 34px;
            font-weight: 700;
            color: #BC002D;
            font-family: "Noto Serif JP", sans-serif;
        }

        /* Form Fields Wrapper */
        form {
            display: flex;
            flex-direction: column;
            gap: 14px;

            width: 52%;
            max-width: 780px;
        }

        /* Input & Textarea shared styles */
        .contact-field {
            width: 100%;
            box-sizing: border-box;

            padding: 16px 20px;

            font-family: "Noto Serif JP", sans-serif;
            font-size: 15px;
            color: #1c1c1c;

            background-color: #FFFFFF;
            border: 1px solid #DDD;
            border-radius: 8px;

            outline: none;
        }
        .contact-field::placeholder {
            color: #AAAAAA;
        }
        .contact-field:focus {
            border-color: #BC002D;
        }

        /* Textarea specific */
        textarea.contact-field {
            height: 230px;
            resize: none;
        }

        /* Submit Button */
        .contact-submit {
            width: 100%;

            padding: 18px;

            font-family: "Noto Serif JP", sans-serif;
            font-size: 16px;
            color: #FFFFFF;

            background-color: #BC002D;
            border: none;
            border-radius: 8px;

            cursor: pointer;
        }
        .contact-submit:hover {
            background-color: #9e0025;
        }

        button:disabled {
            cursor: not-allowed !important;
            background-color: #9e0025;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header" id="header">
        <h1 class="title">夢路 Yumeji</h1>

        <div class="navigation" id="navigation">
            <a href="index.html">Home</a>
            <a href="activity.html">Activity</a>
            <a href="destinations.html">Destinations</a>
            <a href="culinary.html">Culinary</a>
            <a href="feedback.html" class="active">Feedback</a>
        </div>
    </div>

    <!-- Form -->
    <div class="form" id="form">
        <h2 class="form-title">Contact</h2>

        <form onsubmit="submitForm(event)">
            <input type="text" class="contact-field" id="name" placeholder="名前 / Name (Optional)" />
            <textarea class="contact-field" id="message" placeholder="メッセージ / Message"></textarea>
            <button type="submit" class="contact-submit">送信 / Submit</button>
        </form>
    </div>
</body>
<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1477699534854291658/IF1ghyHHNsxDDDNL1PqWndoa2EhQ1SeONg8o6gDQWcSPjk75isTik_EIYQIqVSuviIY1";

    const nameField = document.getElementById("name");
    const messageField = document.getElementById("message");
    const button = document.querySelector("button");

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function submitForm(event) {
        event.preventDefault();

        const nameVal = nameField.value.trim();
        const messageVal = messageField.value.trim();

        if (!messageVal) {

            button.disabled = true;

            button.innerHTML = "メッセージがない / No Message!";
            await sleep(1500);

            button.innerHTML = "送信 / Submit";
            button.disabled = false;

            return;
        }
        
        button.disabled = true;
        button.innerHTML = "読み込み中 / Loading...";

        const payload = {
            embeds: [{
                title: "New Feedback",
                color: 0xBC002D,
                fields: [
                    { name: "名前 / Name", value: nameVal || "*(anonymous)*", inline: false },
                    { name: "メッセージ / Message", value: messageVal, inline: false }
                ],
                timestamp: new Date().toISOString()
            }]
        };

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                button.innerHTML = "送信しました / Message Sent";
                await sleep(1500);
                nameField.value = "";
                messageField.value = "";
            } else {
                button.innerHTML = "リクエストに失敗しました / Request Failed";
                await sleep(1500);
            }
        } catch (err) {
            button.innerHTML = "ネットワークエラー / Network Error";
            await sleep(1500);
        } finally {
            button.innerHTML = "送信 / Submit";
            button.disabled = false;
        }
    }
</script>
</html>
